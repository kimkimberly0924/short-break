<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHORT BREAK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --yellow:#F5C500;
  --white:#FAFAF5;
  --black:#181412;
}

body{
  font-family:'Noto Sans KR',sans-serif;
  height:100vh;
  overflow:hidden;
  position:relative;
  cursor:default;
}

#bg{
  position:absolute;inset:0;
  background-color:#C8311F;
  background-size:cover;
  background-position:center;
  transition:background-color 0.5s ease;
  z-index:0;
}
#bg::after{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  mix-blend-mode:overlay;pointer-events:none;
}

.app{
  position:relative;z-index:10;
  height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:5vh 24px 52px;
}

.logo-wrap{text-align:center;}

.logo-img{
  width:60vw;
  max-width:400px;
}

.spacer{flex:1;}

.tip-card{
  background:var(--white);
  max-width:200px;width:100%;
  position:fixed;
  top:50%;
  left:50%;
  padding:0;
  transform:translateX(-50%) translateY(-20%);
  opacity:0;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s ease;
  pointer-events:none;
  border:2px solid var(--black);
}

.tip-card.visible{
  transform:translateX(-50%) translateY(-50%) scale(1);
  opacity:1;
  pointer-events:all;
}

.card-inner{
  padding:12px;
}

.tip-body{
  display:flex;flex-direction:column;align-items:center;gap:14px;
}

.tip-emoji{font-size:38px;line-height:1;flex-shrink:0;}

.tip-text{
  font-size:13px;
  font-weight:400;
  color:var(--black);
  line-height:1.45;
  white-space:pre-line;
  text-align:center;
}

.btn-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}

.main-btn{
  background:#FCE302;
  color:var(--black);
  border:2.5px solid var(--black);
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px;
  font-weight:500;
  letter-spacing:0.06em;
  border-radius:50%;
  cursor:pointer;
  box-shadow:4px 4px 0 var(--black);
  transition:transform 0.12s ease,box-shadow 0.12s ease;
  user-select:none;
  width:60px;
  height:60px;
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
}
.main-btn:hover{
  transform:translateX(-50%) translate(-2px,-2px);
  box-shadow:6px 6px 0 var(--black);
}
.main-btn:active{
  transform:translateX(-50%) translate(2px,2px);
  box-shadow:2px 2px 0 var(--black);
}

.count-label{
  font-size:11px;font-weight:700;
  letter-spacing:0.2em;
  color:rgba(255,255,255,0.45);
  text-transform:uppercase;
}
</style>
</head>
<body>

<div id="bg"></div>

<div class="app">
  <div class="logo-wrap">
    <img src="./로고.png" class="logo-img" alt="SHORT BREAK">
  </div>

  <div class="spacer"></div>

  <div id="tipCard" class="tip-card" role="region" aria-label="쉬기 팁">
    <div class="card-inner">
      <div class="tip-body">
        <div class="tip-text" id="tipText">팁이 여기 나와요</div>
      </div>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="main-btn" id="mainBtn" onclick="showTip()">톡!</button>
    <div class="count-label" id="countLabel">오늘 0번 쉬었어요</div>
  </div>
</div>

<script>
/* ================================================
   배경 이미지 설정
   img에 이미지 경로를 넣어주세요. 없으면 color만 사용됩니다.
   예시: { color: '#C8311F', img: './bg1.jpg' }
   ================================================ */
const backgrounds = [
  { color: '#C8311F', img: './1.jpg' },
  { color: '#1844CC', img: './2.jpg' },
  { color: '#1A6B3C', img: './3.jpg' },
  { color: '#A02D8C', img: './4.jpg' },
  { color: '#C86A10', img: './5.jpg' },
  { color: '#C86A10', img: './6.jpg' },
  { color: '#C86A10', img: './7.jpg' },
  { color: '#C86A10', img: './8.jpg' },
];

/* ================================================
   쉬기 팁 목록 — 자유롭게 추가/수정 가능해요
   ================================================ */
const tips = [
  { emoji:"🗂️", tip:"서랍 속 오래된 쪽지 구경" },
  { emoji:"🔍", tip:"컨플루언스 페이지 눌러보기" },
  { emoji:"🧹", tip:"물티슈로 책상 닦기" },
  { emoji:"✏️", tip:"메모하는 척 낙서" },
  { emoji:"🖥️", tip:"바탕화면 폴더 정리" },
  { emoji:"🚻", tip:"화장실에서 릴스 보기" },
  { emoji:"⏰", tip:"핸드폰 알람 지우기" },
  { emoji:"📊", tip:"엑셀 보며 멍때리기" },
  { emoji:"🍽️", tip:"점심 맛집 찾아보기" },
  { emoji:"🏢", tip:"빈 회의실에 앉아있기" },
  { emoji:"🖨️", tip:"프린터 앞에 서있기" },
  { emoji:"💼", tip:"노트북 들고 산책하기" },
  { emoji:"🍱", tip:"오늘 저녁 메뉴 고민" },
  { emoji:"🎧", tip:"이어폰 한쪽만 끼고 음악 감상" },
  { emoji:"📱", tip:"급한 전화 받는 척 나가기" },
  { emoji:"🔄", tip:"화물 엘베 타고 오르내리기" },
  { emoji:"💡", tip:"모니터 밝기 셋팅하기" },
  { emoji:"📋", tip:"서류 들고 걷기" },
  { emoji:"🗓️", tip:"캘린더 일정 색 바꿔보기" },
  { emoji:"🗃️", tip:"파일 이름 수정하기" },
  { emoji:"✉️", tip:"이메일 서명 폰트 바꾸기" },
  { emoji:"🖥️", tip:"화면보호기 종류 구경하기" },
  { emoji:"🔮", tip:"AI랑 사주보기" },
  { emoji:"💌", tip:"친한 동료에게 이메일쓰기" },
  { emoji:"📣", tip:"사내 공지 읽기" },
  { emoji:"📁", tip:"다운로드 폴더보며 추억팔이" },
  { emoji:"🍫", tip:"간식창고 탐색하기" },
  { emoji:"☕", tip:"커피 다시 타오기" },
];

let count = 0;
let lastBg = -1;
let lastTip = -1;

function rnd(max, excl){
  if(max===1) return 0;
  let n;
  do{ n = Math.floor(Math.random()*max); }while(n===excl);
  return n;
}

function changeBg(){
  const i = rnd(backgrounds.length, lastBg);
  lastBg = i;
  const b = backgrounds[i];
  const el = document.getElementById('bg');
  el.style.backgroundColor = b.color;
  el.style.backgroundImage = b.img ? `url('${b.img}')` : 'none';
}

function showTip(){
  const i = rnd(tips.length, lastTip);
  lastTip = i;
  const t = tips[i];

  document.getElementById('tipText').textContent = t.emoji + ' ' + t.tip;

  changeBg();

  const card = document.getElementById('tipCard');
  card.classList.remove('visible');
  requestAnimationFrame(()=>requestAnimationFrame(()=>card.classList.add('visible')));

  count++;
  document.getElementById('countLabel').textContent = `오늘 ${count}번 쉬었어요`;
  document.getElementById('mainBtn').textContent = '톡!';
}

changeBg();
</script>
</body>
</html>
